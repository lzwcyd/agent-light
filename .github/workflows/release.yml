name: Release

# 推送 v* tag 时自动生成 Release；也支持在 Actions 页面手动触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（手动触发时填写，例如 v1.0.0）"
        required: true

permissions:
  contents: write

jobs:
  # ── 解析版本号，供后续所有 job 共享 ──────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$TAG version=$VERSION"

  # ── 源码归档（tar.gz + zip）────────────────────────
  build-source:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archives
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PREFIX="agent-light-${{ needs.prepare.outputs.version }}"
          mkdir -p dist
          # git archive 只包含被 git 跟踪的文件，天然排除 .venv / __pycache__ 等
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "dist/${PREFIX}.tar.gz" "$TAG" 2>/dev/null \
            || git archive --format=tar.gz --prefix="${PREFIX}/" -o "dist/${PREFIX}.tar.gz" HEAD
          git archive --format=zip    --prefix="${PREFIX}/" -o "dist/${PREFIX}.zip"    "$TAG" 2>/dev/null \
            || git archive --format=zip    --prefix="${PREFIX}/" -o "dist/${PREFIX}.zip"    HEAD
          ( cd dist && shasum -a 256 "${PREFIX}.tar.gz" "${PREFIX}.zip" > "${PREFIX}.sha256.txt" )
          ls -lh dist

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-archives
          path: dist/*

  # ── macOS 单文件可执行（双架构原生构建）──────────────
  build-macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14         # Apple Silicon
            arch: arm64
          - runner: macos-15-intel   # Intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller --clean --onefile \
            --name agent-light \
            --add-data "agent_light/assets:agent_light/assets" \
            --collect-submodules objc \
            --collect-submodules AppKit \
            --collect-submodules Foundation \
            --collect-submodules Quartz \
            --collect-submodules ApplicationServices \
            agent_light/main.py
          test -f dist/agent-light || { echo "✗ 二进制未生成"; exit 1; }

      - name: Verify architecture & smoke test
        run: |
          lipo -archs dist/agent-light || file dist/agent-light
          # relay 分流：不弹 GUI、读 stdin、输出 {} 后退出
          echo '{"hook_event_name":"Stop"}' | AGENT_LIGHT_RELAY=1 AGENT_LIGHT_TOOL=cursor dist/agent-light

      - name: Package asset
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ASSET="agent-light-macos-${{ matrix.arch }}.tar.gz"
          mkdir -p package
          cp dist/agent-light package/
          chmod +x package/agent-light
          tar -C package -czf "$ASSET" agent-light
          shasum -a 256 "$ASSET" > "$ASSET.sha256.txt"
          ls -lh "$ASSET"*

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            agent-light-macos-${{ matrix.arch }}.tar.gz
            agent-light-macos-${{ matrix.arch }}.tar.gz.sha256.txt

  # ── 汇总所有产物，创建 / 更新 Release ──────────────
  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-source, build-macos]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -lh dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Agent Light ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 安装

            **无需本机 Python**，下载对应架构的包，解压得到 `agent-light` 可执行文件：

            | Mac 芯片 | `uname -m` | 下载 |
            |----------|-----------|------|
            | Apple Silicon（M1/M2/M3…） | `arm64` | `agent-light-macos-arm64.tar.gz` |
            | Intel | `x86_64` | `agent-light-macos-x64.tar.gz` |

            ```bash
            tar -xzf agent-light-macos-*.tar.gz
            xattr -dr com.apple.quarantine ./agent-light   # 未签名，放行 Gatekeeper
            ./agent-light                                   # 启动菜单栏应用
            ```

            源码包（`agent-light-*.tar.gz` 形如 `agent-light-<版本>.tar.gz` / `.zip`）面向从源码运行的用户。
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256.txt
