name: Release

# 推送 v* tag 时自动生成 Release；也支持在 Actions 页面手动触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（手动触发时填写，例如 v1.0.0）"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$TAG version=$VERSION"

      - name: Build source archives
        id: build
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREFIX="agent-light-${{ steps.ver.outputs.version }}"
          mkdir -p dist
          # git archive 只包含被 git 跟踪的文件，天然排除 .venv / __pycache__ 等
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "dist/${PREFIX}.tar.gz" "$TAG" 2>/dev/null \
            || git archive --format=tar.gz --prefix="${PREFIX}/" -o "dist/${PREFIX}.tar.gz" HEAD
          git archive --format=zip    --prefix="${PREFIX}/" -o "dist/${PREFIX}.zip"    "$TAG" 2>/dev/null \
            || git archive --format=zip    --prefix="${PREFIX}/" -o "dist/${PREFIX}.zip"    HEAD
          ( cd dist && sha256sum "${PREFIX}.tar.gz" "${PREFIX}.zip" > "${PREFIX}.sha256.txt" )
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          ls -lh dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Agent Light ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/${{ steps.build.outputs.prefix }}.tar.gz
            dist/${{ steps.build.outputs.prefix }}.zip
            dist/${{ steps.build.outputs.prefix }}.sha256.txt
