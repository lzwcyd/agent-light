name: Release

# 推送 v* tag 时自动生成 Release；也支持在 Actions 页面手动触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（手动触发时填写，例如 v1.0.0）"
        required: true

permissions:
  contents: write

jobs:
  # ── 解析版本号，供后续所有 job 共享 ──────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$TAG version=$VERSION"

  # ── 源码归档（tar.gz + zip）────────────────────────
  build-source:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archives
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PREFIX="agent-light-${{ needs.prepare.outputs.version }}"
          mkdir -p dist
          # git archive 只包含被 git 跟踪的文件，天然排除 .venv / __pycache__ 等
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "dist/${PREFIX}.tar.gz" "$TAG" 2>/dev/null \
            || git archive --format=tar.gz --prefix="${PREFIX}/" -o "dist/${PREFIX}.tar.gz" HEAD
          git archive --format=zip    --prefix="${PREFIX}/" -o "dist/${PREFIX}.zip"    "$TAG" 2>/dev/null \
            || git archive --format=zip    --prefix="${PREFIX}/" -o "dist/${PREFIX}.zip"    HEAD
          ( cd dist && shasum -a 256 "${PREFIX}.tar.gz" "${PREFIX}.zip" > "${PREFIX}.sha256.txt" )
          ls -lh dist

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-archives
          path: dist/*

  # ── macOS .app → .dmg（双架构原生构建）─────────────
  build-macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller
          brew install create-dmg

      - name: Build .app
        env:
          AGENT_LIGHT_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          pyinstaller --noconfirm agent-light.spec
          test -d "dist/Agent Light.app" || { echo "✗ .app 未生成"; exit 1; }

      - name: Verify architecture
        run: |
          BIN="dist/Agent Light.app/Contents/MacOS/agent-light"
          lipo -archs "$BIN" || file "$BIN"

      - name: Create DMG
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          DMG="dist/AgentLight-${VERSION}-${ARCH}.dmg"
          # create-dmg 带拖拽到 Applications 的安装 UI；失败回退 hdiutil
          create-dmg \
            --volname "Agent Light" \
            --window-size 540 380 \
            --icon "Agent Light.app" 140 190 \
            --app-drop-link 400 190 \
            --no-internet-enable \
            "$DMG" "dist/Agent Light.app" \
          || hdiutil create -volname "Agent Light" \
               -srcfolder "dist/Agent Light.app" \
               -ov -format UDZO "$DMG"
          ( cd dist && shasum -a 256 "AgentLight-${VERSION}-${ARCH}.dmg" \
              > "AgentLight-${VERSION}-${ARCH}.dmg.sha256.txt" )
          ls -lh dist/*.dmg*

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.dmg.sha256.txt

  # ── 汇总所有产物，创建 / 更新 Release ──────────────
  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-source, build-macos]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -lh dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Agent Light ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 安装

            **无需本机 Python**，下载对应架构的 DMG，拖入「应用程序」即可：

            | Mac 芯片 | 下载 |
            |----------|------|
            | Apple Silicon（M1/M2/M3…，`uname -m` = `arm64`） | `AgentLight-${{ needs.prepare.outputs.version }}-arm64.dmg` |
            | Intel（`uname -m` = `x86_64`） | `AgentLight-${{ needs.prepare.outputs.version }}-x86_64.dmg` |

            > 应用未签名，首次打开请**右键 →「打开」**，或执行：
            > `xattr -dr com.apple.quarantine "/Applications/Agent Light.app"`

            源码包（`agent-light-*.tar.gz` / `.zip`）面向从源码运行的用户。
          files: |
            dist/*.dmg
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256.txt
